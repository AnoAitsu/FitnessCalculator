<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fitness Calculator - BMI</title>
    <style>
        :root{--bg:#f4f7fb;--card:#fff;--muted:#6b7280}
        body{font-family:Segoe UI,Roboto,'Helvetica Neue',Arial;background-image: url("https://pbs.twimg.com/media/DfLMTSIU8AAOhly.jpg");background-size:cover;background-position:center center;background-repeat:no-repeat;margin:0;padding:32px;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .container{width:100%;max-width:760px}
        .card{background:var(--card);border-radius:12px;box-shadow:0 6px 18px rgba(15,23,42,0.08);padding:22px}
        h1{margin:0 0 8px;font-size:20px}
        p.lead{margin:0 0 18px;color:var(--muted)}
        form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
        input,select,button{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #e6e9ee;font-size:14px}
        input:focus,select:focus{outline:none;border-color:#cbd5e1;box-shadow:0 0 0 3px rgba(96,165,250,0.08)}
        .full{grid-column:1/-1}
        button{background:#2563eb;color:#fff;border:none;cursor:pointer}
        button:hover{background:#1e40af}
        #resultCard{margin-top:14px;padding:16px;border-radius:10px;transition:all .22s}
        .hidden{display:none}
        .meta{font-size:13px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
        @media (max-width:560px){form{grid-template-columns:1fr}body{padding:16px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>BMI and BMR Calculator</h1>
            <p class="lead">Enter your details to check your Body Mass Index and Basal Metabolic Rate.</p>
            <form id="bmiForm">
                <div class="full">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="ex. Juan Dela Cruz">
                </div>
                <div>
                    <label for="age">Age</label>
                    <input type="number" id="age" min="1" max="120" required>
                </div>
                <div>
                    <label>Sex</label>
                    <select id="sex" required>
                        <option value="">Select</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                    </select>
                </div>
                <div>
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" min="1" required>
                </div>
                <div>
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" min="1" required>
                </div>
                <div class="full">
                    <button type="submit" id="submitBtn">Check My BMI and BMR</button>
                </div>
            </form>
            <section id="resultCard" class="hidden" aria-live="polite"></section>
        </div>
    </div>
    
    <script>
    // Paste your exact deployed Apps Script URL here
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxACkr7dLGnkNs8JIfAfgUGe31AgwGxHmbCyt__MCJBSie-UW9l3BsSPrfd5nnyjNxqbA/exec';

    document.getElementById('bmiForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value, 10);
            const sex = document.getElementById('sex').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const heightCm = parseFloat(document.getElementById('height').value);

            if (!name || !sex || isNaN(age) || isNaN(weight) || isNaN(heightCm) || age <= 0 || weight <= 0 || heightCm <= 0) {
                    alert('Please fill out all fields with valid values.');
                    return;
            }

            const heightM = heightCm / 100;
            const bmi = +(weight / (heightM * heightM)).toFixed(1);
            const bmr = calculateBMR(sex, age, weight, heightCm);

            if (bmr === null) {
                    alert('Please select a valid sex option.');
                    return;
            }

            let category, message, color;
            switch (true) {
                    case bmi < 18.5:
                            category = 'Underweight'; color = '#5DADE2'; message = 'Consider a balanced, calorie-sufficient diet.'; break;
                    case bmi < 25:
                            category = 'Normal'; color = '#58D68D'; message = 'Great! Keep up your healthy habits.'; break;
                    case bmi < 30:
                            category = 'Overweight'; color = '#F5B041'; message = 'Consider more physical activity and mindful eating.'; break;
                    default:
                            category = 'Obese'; color = '#EC7063'; message = 'We recommend consulting a healthcare provider.';
            }

            showResult(name, bmi, bmr, category, message, color);
            recordSubmission({ name, age, sex, weight, heightCm, bmi, bmr, category });
    });

    function showResult(name, bmi, bmr, category, message, color) {
            const resultCard = document.getElementById('resultCard');
            resultCard.classList.remove('hidden');
            resultCard.style.border = `2px solid ${color}`;
            resultCard.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
                    <div>
                        <h2 style="margin:0 0 6px;font-size:18px">${name}'s Fitness Results</h2>
                        <div class="meta">
                            <span><strong>BMI:</strong> ${bmi}</span>
                            <span><strong>BMR:</strong> ${Math.round(bmr)} kcal/day</span>
                            <span><strong>Category:</strong> ${category}</span>
                        </div>
                        <p style="margin:10px 0 0">${message}</p>
                    </div>
                    <div style="min-width:84px;text-align:center;padding:10px;border-radius:8px;background:${color};color:#fff;font-weight:600">${category}</div>
                </div>`;
    }

    function calculateBMR(gender, age, weight, height) {
        const baseBMR = (10 * weight) + (6.25 * height) - (5 * age);
        const formattedGender = gender.toLowerCase().trim();
        
        if (formattedGender === 'male') {
            return baseBMR + 5;
        } else if (formattedGender === 'female') {
            return baseBMR - 161;
        } else {
            return null;
        }
    }

    function recordSubmission(record) {
 fetch(SCRIPT_URL, {
     method: 'POST',
     mode: 'no-cors', // <-- Add this line to bypass the CORS block
     headers: {
         'Content-Type': 'application/json'
     },
     body: JSON.stringify(record)
 }).catch(err => console.error('Could not record submission:', err));
}

    </script>
</body>
</html>
